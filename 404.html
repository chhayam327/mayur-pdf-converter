<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayur Office AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0f14; color: #ffffff; }
        .glass-card { background: #1a1d26; border: 1px solid #2d313d; transition: 0.3s; }
        .glass-card:active { transform: scale(0.95); border-color: #8b5cf6; }
        .premium-text { background: linear-gradient(90deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="pb-20">

    <div class="p-5 flex justify-between items-center bg-[#0d0f14] sticky top-0 z-50">
        <h1 class="text-xl font-black italic tracking-tighter text-purple-500">MAYUR TEAM</h1>
        <button onclick="openPremium()" class="bg-gradient-to-r from-purple-600 to-pink-600 px-4 py-1.5 rounded-lg text-[10px] font-bold shadow-lg shadow-purple-500/20">PREMIUM</button>
    </div>

    <div class="px-5 py-2">
        <div class="flex gap-4 mb-4 text-sm font-bold border-b border-gray-800 pb-2">
            <span class="text-purple-500 border-b-2 border-purple-500 pb-2">AI Tools ✨</span>
            <span class="text-gray-500">Other Tools</span>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div onclick="document.getElementById('pdfInput').click()" class="glass-card p-4 rounded-2xl relative overflow-hidden">
                <i class="fas fa-file-word text-blue-400 text-xl"></i>
                <p class="text-xs font-bold mt-3 uppercase tracking-tight">PDF to WORD</p>
                <p class="text-[9px] text-gray-500 mt-1">Direct Share & Edit</p>
                <input type="file" id="pdfInput" class="hidden" accept=".pdf" onchange="startConversion()">
            </div>

            <div class="glass-card p-4 rounded-2xl">
                <i class="fas fa-magic text-purple-400 text-xl"></i>
                <p class="text-xs font-bold mt-3 uppercase tracking-tight">AI Spell Check</p>
                <span class="absolute top-2 right-2 bg-orange-500 text-[8px] px-1 rounded">NEW</span>
            </div>
        </div>
    </div>

    <div class="px-5 py-4">
        <h2 class="text-gray-400 text-[11px] font-bold uppercase tracking-widest mb-3">AI Read</h2>
        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card p-4 rounded-2xl flex items-center gap-3">
                <i class="fas fa-file-alt text-purple-500"></i>
                <span class="text-[11px] font-bold">Summarize</span>
            </div>
            <div class="glass-card p-4 rounded-2xl flex items-center gap-3">
                <i class="fas fa-comments text-pink-500"></i>
                <span class="text-[11px] font-bold">Chat PDF</span>
            </div>
        </div>
    </div>

    <div class="px-5 py-4">
        <h2 class="text-gray-400 text-[11px] font-bold uppercase tracking-widest mb-3">Image Tools</h2>
        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card p-4 rounded-2xl">
                <i class="fas fa-eraser text-red-400"></i>
                <p class="text-[11px] font-bold mt-2">BG Removal</p>
            </div>
            <div class="glass-card p-4 rounded-2xl">
                <i class="fas fa-bolt text-yellow-400"></i>
                <p class="text-[11px] font-bold mt-2">Auto Enhancer</p>
            </div>
        </div>
    </div>

    <div class="px-5 py-4">
        <h2 class="text-gray-400 text-[11px] font-bold uppercase tracking-widest mb-3">Office Suite</h2>
        <div class="grid grid-cols-1 gap-3">
            <div class="glass-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-file-excel text-green-500"></i>
                    <span class="text-[11px] font-bold uppercase">Simple Hisab (Excel)</span>
                </div>
                <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full bg-[#0d0f14]/90 backdrop-blur-lg border-t border-gray-800 flex justify-around py-3">
        <div class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-clock text-lg"></i>
            <span class="text-[9px]">Recent</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-purple-500">
            <i class="fas fa-compass text-lg"></i>
            <span class="text-[9px]">Discover</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-500" onclick="openPremium()">
            <i class="fas fa-crown text-lg"></i>
            <span class="text-[9px]">Premium</span>
        </div>
    </div>

    <script>
        function startConversion() {
            alert("Mayur Team Server: Converting PDF to Direct Word File...");
        }
        function openPremium() { /* Modal open logic */ }
    </script>
</body>
                    </html>
