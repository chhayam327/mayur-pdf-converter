<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited PDF to Word - Mayur Team</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/docx@8.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { margin-bottom: 10px; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .upload-area { border: 2px dashed rgba(255,255,255,0.3); padding: 40px 20px; border-radius: 15px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: var(--primary); background: rgba(255,255,255,0.02); }
        input[type="file"] { display: none; }
        button { background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; padding: 15px 30px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; transition: transform 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #aaa; }
        .footer { margin-top: 30px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mayur PDF Tools</h1>
    <p>Unlimited & Private Conversion</p>
    
    <label class="upload-area" id="drop-area">
        <div id="file-label">Click or Drag PDF here</div>
        <input type="file" id="pdfInput" accept="application/pdf">
    </label>

    <button id="convertBtn" disabled>Convert to Word (.docx)</button>
    <div id="status">Ready for action 🚀</div>

    <div class="footer">Made for Mayur Team - No Server, No Limits!</div>
</div>

<script>
    const pdfInput = document.getElementById('pdfInput');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const fileLabel = document.getElementById('file-label');

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    pdfInput.onchange = (e) => {
        if(e.target.files.length > 0) {
            fileLabel.innerText = e.target.files[0].name;
            convertBtn.disabled = false;
        }
    };

    convertBtn.onclick = async () => {
        const file = pdfInput.files[0];
        if (!file) return;

        convertBtn.disabled = true;
        status.innerText = "Reading PDF content... ⏳";

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            const sections = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                status.innerText = `Processing Page ${i} of ${pdf.numPages}...`;
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const text = textContent.items.map(item => item.str).join(' ');

                sections.push({
                    properties: {},
                    children: [new docx.Paragraph({ children: [new docx.TextRun(text)] })]
                });
            }

            status.innerText = "Generating Word file... 🖋️";
            const doc = new docx.Document({ sections });
            const blob = await docx.Packer.toBlob(doc);
            
            saveAs(blob, file.name.replace(".pdf", "") + "_Converted.docx");
            status.innerText = "✅ Done! Your file has been saved.";
        } catch (err) {
            console.error(err);
            status.innerText = "❌ Error: Could not convert this file.";
        } finally {
            convertBtn.disabled = false;
        }
    };
</script>

</body>
</html>
