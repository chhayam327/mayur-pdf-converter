<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayur PDF Ultra - 10+ Universal Tools (Any Language)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@7.1.0/build/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        :root { --primary: #00f2ff; --premium: #ffae00; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* ilovePDF-style Grid on Entry Page */
        .dashboard-container { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 900px; }
        .tool-btn { background: var(--card); border: none; padding: 25px; border-radius: 15px; color: var(--text); font-weight: bold; cursor: pointer; transition: 0.3s; position: relative; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid transparent; }
        .tool-btn:hover { border-color: var(--primary); transform: translateY(-3px); background: #222a3e; }
        .premium-btn { border-color: var(--premium); background: rgba(255,174,0,0.1); }
        .premium-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; color: var(--premium); font-weight: bold; }

        /* Feature View (Large Screen) */
        .feature-screen { display: none; width: 95%; max-width: 1000px; background: var(--card); border-radius: 20px; padding: 30px; margin: 30px 0; border: 1px solid rgba(255,255,255,0.1); }
        .feature-header { display: flex; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .feature-header h2 { margin-left: 10px; color: var(--primary); }
        .feature-body { padding-top: 20px; text-align: left; }
        .close-btn { background: #ff4d4d; border: none; color: white; border-radius: 5px; cursor: pointer; padding: 5px 10px; margin-right: 15px; }

        /* Ad Modal with Countdown */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; color: black; padding: 20px; border-radius: 15px; text-align: center; max-width: 320px; }
        .countdown { font-size: 24px; font-weight: bold; color: #ff4d4d; margin-top: 10px; }
        .ad-space { background: #eee; width: 300px; height: 250px; display: flex; align-items: center; justify-content: center; border: 1px dashed #ccc; margin-bottom: 15px; font-size: 10px; color: #999; }
    </style>
</head>
<body>

    <div id="dashboard" class="dashboard-container">
        <h1>Mayur PDF Universal 🌐</h1>
        <p style="opacity: 0.6; margin-bottom: 25px;">Unlimited Tools • No Server • Multi-Language Support</p>
        
        <div class="grid">
            <button class="tool-btn" style="color:#00f2ff;" onclick="showFeature('word')">📄 PDF to Word</button>
            <button class="tool-btn" style="color:#ff00ea;" onclick="showFeature('jpg')">🖼️ PDF to JPG</button>
            <button class="tool-btn" style="color:#ffee00;" onclick="showFeature('watermark')">💧 Add Watermark</button>
            <button class="tool-btn" style="color:#00ff8c;" onclick="showFeature('rotate')">🔄 Rotate PDF</button>
            <button class="tool-btn" style="color:#ff7b00;" onclick="showFeature('removepages')">✂️ Remove Pages</button>
            
            <button class="tool-btn premium-btn" style="color:#ffae00;" onclick="checkPremium('png')">
                <span class="premium-tag">PRO</span>🖼️ PDF to PNG (HQ)
            </button>
            <button class="tool-btn premium-btn" style="color:#ffae00;" onclick="checkPremium('organize')">
                <span class="premium-tag">PRO</span>📂 Organize Pages
            </button>
            <button class="tool-btn premium-btn" style="color:#ffae00;" onclick="checkPremium('html')">
                <span class="premium-tag">PRO</span>🔗 PDF to HTML
            </button>
        </div>
    </div>

    <div id="featureScreen" class="feature-screen">
        <div class="feature-header">
            <button class="close-btn" onclick="closeFeature()">Back</button>
            <h2 id="featureTitle">Feature Title</h2>
        </div>
        <div class="feature-body">
            <input type="file" id="fileInput" accept="application/pdf" style="padding:15px; background:rgba(255,255,255,0.05); border-radius:10px; width:100%;">
            <button id="convertBtn" style="background:#00f2ff; color:#000; border:none; padding:15px; border-radius:10px; width:100%; margin-top:15px; font-weight:bold; cursor:pointer; font-size:16px;">Convert</button>
            <div id="featureStatus" style="margin-top:15px; padding:10px; border-radius:5px; background:rgba(255,255,255,0.05);">Status: Ready 🚀</div>
        </div>
    </div>

    <div id="adModal" class="modal">
        <div class="modal-content">
            <div class="ad-space">Google AdSense - Square Ad</div>
            <p>Aapki file ready ho rahi hai...</p>
            <div id="countdown" class="countdown">8</div>
        </div>
    </div>

    <script>
        let currentFeature = '';
        let premiumUser = false; // Placeholder, you can set based on user status
        const adModal = document.getElementById('adModal');
        const countdownEl = document.getElementById('countdown');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        function showFeature(feature) {
            currentFeature = feature;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('featureScreen').style.display = 'block';
            document.getElementById('featureTitle').innerText = `Mayur: ${feature.toUpperCase()}`;
        }

        function closeFeature() {
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('featureScreen').style.display = 'none';
        }

        function checkPremium(feature) {
            if(premiumUser) { showFeature(feature); } 
            else { alert('⭐ Ye ek Premium (PRO) feature hai. Use karne ke liye support karein.'); }
        }

        async function doConversion() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Bhai, file toh select kar lo!");

            adModal.style.display = 'flex';
            let timer = premiumUser ? 2 : 8;
            countdownEl.innerText = timer;
            let downloadFunction = () => {};

            // Start countdown first
            const interval = setInterval(() => {
                timer--;
                countdownEl.innerText = timer;
                if(timer <= 0) {
                    clearInterval(interval);
                    adModal.style.display = 'none';
                    downloadFunction();
                }
            }, 1000);

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;

                if(currentFeature === 'word') {
                    // Optimized Word Conversion (Text extraction)
                    let sections = [];
                    for(let i=1; i<=pdf.numPages; i++){
                        const page = await pdf.getPage(i);
                        const text = await page.getTextContent();
                        sections.push(new docx.Paragraph({ children: [new docx.TextRun(text.items.map(s => s.str).join(' '))] }));
                    }
                    const doc = new docx.Document({ sections: [{ children: sections }] });
                    const blob = await docx.Packer.toBlob(doc);
                    downloadFunction = () => saveAs(blob, file.name.replace(".pdf", "_Word.docx"));
                } 
                else if(currentFeature === 'jpg') {
                    // JPG Zip Conversion
                    const zip = new JSZip();
                    for(let i=1; i<=pdf.numPages; i++){
                        const page = await pdf.getPage(i);
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        const viewport = page.getViewport({scale: 1.5});
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({canvasContext: context, viewport: viewport}).promise;
                        zip.file(`page_${i}.jpg`, canvas.toDataURL('image/jpeg', 0.8).split(',')[1], {base64: true});
                    }
                    const zipBlob = await zip.generateAsync({type:"blob"});
                    downloadFunction = () => saveAs(zipBlob, file.name.replace(".pdf", "_JPG_Images.zip"));
                }
                else if(currentFeature === 'watermark') {
                    // Local pdf-lib Watermarking
                    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                    const pages = pdfDoc.getPages();
                    pages.forEach(page => {
                        page.drawText('Mayur Team Rocks!', { x: 50, y: 50, size: 20, color: PDFLib.rgb(1, 0, 0), opacity: 0.5 });
                    });
                    const pdfBytes = await pdfDoc.save();
                    downloadFunction = () => saveAs(new Blob([pdfBytes]), file.name.replace(".pdf", "_Watermarked.pdf"));
                }
                // Add more complex cases like split, rotate using pdf-lib here
                
                document.getElementById('featureStatus').innerText = "✅ Conversion successful. Waiting for ad timer.";
            } catch(e) {
                adModal.style.display = 'none'; // Close modal on error
                document.getElementById('featureStatus').innerText = "❌ Error in conversion. File may be complex.";
                clearInterval(interval);
            }
        }
        document.getElementById('convertBtn').onclick = doConversion;
    </script>
</body>
                </html>
