<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick OCR - Image to Text</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        #upload { margin: 20px 0; }
        #output { width: 100%; height: 200px; margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; resize: none; }
        .btn { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        #status { margin-top: 10px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Office Help OCR Tool</h2>
    <p>Image select karein aur text nikaalein</p>
    
    <input type="file" id="upload" accept="image/*">
    <br>
    <button class="btn" id="start-btn">Convert to Text</button>
    
    <div id="status">Taiyaar...</div>
    
    <textarea id="output" placeholder="Aapka text yahan dikhega..."></textarea>
    <br>
    <button class="btn" onclick="copyText()">Copy Text</button>
</div>

<script>
    const upload = document.getElementById('upload');
    const startBtn = document.getElementById('start-btn');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    startBtn.onclick = async () => {
        const file = upload.files[0];
        if (!file) return alert("Pehle image select karein!");

        status.innerText = "Processing... Thoda intezar karein";
        startBtn.disabled = true;

        const { data: { text } } = await Tesseract.recognize(file, 'eng+hin', {
            logger: m => { if(m.status === 'recognizing text') status.innerText = `Padh raha hoon: ${Math.round(m.progress * 100)}%`; }
        });

        output.value = text;
        status.innerText = "Kaam pura ho gaya!";
        startBtn.disabled = false;
    };

    function copyText() {
        output.select();
        document.execCommand('copy');
        alert("Text copy ho gaya!");
    }
</script>

</body>
</html>
