<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I LOVE PDF TOOLKIT - Pro Editor & Viewer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { --red: #e53935; --dark: #2d2d2d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f3f6f9; }
        header { background: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 900; cursor: pointer; color: #333; text-decoration: none; }
        .logo span { color: var(--red); }

        /* Sidebar & Layout */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.3s; padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar.active { left: 0; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        
        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-bottom: 4px solid var(--red); }
        .card i { font-size: 30px; margin-bottom: 10px; display: block; color: var(--red); }

        /* Internal Viewer & Editor Area */
        #viewer-container { display: none; background: #525659; padding: 20px; min-height: 100vh; text-align: center; }
        #pdf-render { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.3); margin: auto; max-width: 100%; }
        .editor-controls { background: white; padding: 15px; position: sticky; top: 60px; z-index: 900; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; border-bottom: 2px solid var(--red); }

        /* Buttons */
        .btn { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-green { background: #43a047; }
        .input-box { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }

        #tool-ui { display: none; text-align: center; padding: 40px 20px; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="padding:20px; font-weight:bold; border-bottom:1px solid #eee;">MENU</div>
    <div onclick="location.reload()" style="padding:15px; cursor:pointer;"><i class="fas fa-home"></i> Dashboard</div>
    <div onclick="alert('Watermark Tool Activated')" style="padding:15px; cursor:pointer;"><i class="fas fa-stamp"></i> Watermark Settings</div>
</div>

<header>
    <div onclick="document.getElementById('sidebar').classList.toggle('active')" style="cursor:pointer;"><i class="fas fa-bars"></i></div>
    <a href="#" class="logo">I<span><i class="fas fa-heart"></i>PDF</span>TOOLKIT</a>
    <div><i class="fas fa-user-circle"></i></div>
</header>

<div class="container" id="home-view">
    <div class="grid">
        <div class="card" onclick="openTool('Merge PDF')"><i class="fas fa-layer-group"></i><h3>Merge PDF</h3></div>
        <div class="card" onclick="openTool('PDF to Word')"><i class="fas fa-file-word"></i><h3>PDF to Word</h3></div>
        <div class="card" onclick="openTool('Add Watermark')"><i class="fas fa-stamp"></i><h3>Watermark</h3></div>
        <div class="card" onclick="openTool('Compress PDF')"><i class="fas fa-compress-arrows-alt"></i><h3>Compress</h3></div>
        <div class="card" onclick="openTool('PDF to JPG')"><i class="fas fa-file-image"></i><h3>PDF to JPG</h3></div>
        <div class="card" onclick="openTool('Unlock PDF')"><i class="fas fa-unlock"></i><h3>Unlock</h3></div>
        <div class="card" onclick="openTool('Protect PDF')"><i class="fas fa-lock"></i><h3>Protect</h3></div>
        <div class="card" onclick="openTool('Edit PDF')"><i class="fas fa-edit"></i><h3>Edit PDF</h3></div>
    </div>
</div>

<div id="tool-ui" class="container">
    <h2 id="t-title">Tool</h2>
    <input type="file" id="file-in" hidden multiple onchange="handleFileSelection()">
    <button class="btn" style="font-size:20px;" onclick="document.getElementById('file-in').click()">Choose Files</button>
    <div id="convert-section" style="display:none; margin-top:20px;">
        <p id="f-count"></p>
        <input type="text" id="watermark-text" placeholder="Enter Watermark Text" class="input-box">
        <br><br>
        <button class="btn btn-green" onclick="startProcessing()">Convert & Open in Website</button>
    </div>
</div>

<div id="viewer-container">
    <div class="editor-controls">
        <button class="btn" onclick="location.reload()">Back</button>
        <button class="btn btn-green" id="final-download">Save & Download</button>
        <span style="color:#333; font-weight:bold; align-self:center;">Preview Mode</span>
    </div>
    <canvas id="pdf-render"></canvas>
    <div style="color:white; margin-top:10px;">Page 1 of <span id="page-count">1</span></div>
</div>

<script>
    let activeTool = "";
    let selectedFiles = [];
    let currentPdfBytes = null;

    function openTool(name) {
        activeTool = name;
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('tool-ui').style.display = 'block';
        document.getElementById('t-title').innerText = name;
    }

    function handleFileSelection() {
        const f = document.getElementById('file-in').files;
        if(f.length === 0) return;
        selectedFiles = Array.from(f);
        document.getElementById('convert-section').style.display = 'block';
        document.getElementById('f-count').innerText = f.length + " file(s) selected";
    }

    async function startProcessing() {
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        try {
            let pdfDoc;
            if(activeTool === "Merge PDF" && selectedFiles.length > 1) {
                pdfDoc = await PDFDocument.create();
                for(let f of selectedFiles) {
                    const doc = await PDFDocument.load(await f.arrayBuffer());
                    const pages = await pdfDoc.copyPages(doc, doc.getPageIndices());
                    pages.forEach(p => pdfDoc.addPage(p));
                }
            } else {
                pdfDoc = await PDFDocument.load(await selectedFiles[0].arrayBuffer());
            }

            // Watermark Logic
            const wText = document.getElementById('watermark-text').value;
            if(wText) {
                const font = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                const pages = pdfDoc.getPages();
                pages.forEach(p => {
                    p.drawText(wText, { x: 50, y: 50, size: 50, font: font, color: rgb(0.7, 0.7, 0.7), opacity: 0.5, rotate: PDFLib.degrees(45) });
                });
            }

            currentPdfBytes = await pdfDoc.save();
            renderInternalPDF(currentPdfBytes);

        } catch (e) {
            alert("Error: Mobile memory full. Try small file.");
        }
    }

    async function renderInternalPDF(data) {
        document.getElementById('tool-ui').style.display = 'none';
        document.getElementById('viewer-container').style.display = 'block';
        
        const loadingTask = pdfjsLib.getDocument({data: data});
        const pdf = await loadingTask.promise;
        document.getElementById('page-count').innerText = pdf.numPages;

        const page = await pdf.getPage(1);
        const viewport = page.getViewport({scale: 1.5});
        const canvas = document.getElementById('pdf-render');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({canvasContext: context, viewport: viewport}).promise;

        document.getElementById('final-download').onclick = () => {
            download(data, "I_LOVE_PDF_Edited.pdf", "application/pdf");
        };
    }
</script>
</body>
    </html>
