<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayur Unlimited PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@7.1.0/build/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary: #4cc9f0; --bg: #1a1a2e; --card: #16213e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: var(--primary); margin-bottom: 20px; }
        input[type="file"] { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 20px; border: 1px dashed var(--primary); color: white; }
        .btn { background: #4361ee; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn:disabled { background: #3f37c9; opacity: 0.6; }
        #status { margin-top: 20px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Mayur PDF Tools</h2>
        <p style="opacity: 0.7;">No Limits • High Speed • Private</p>
        <input type="file" id="fileInput" accept="application/pdf">
        <button id="convertBtn" class="btn">Convert to Word (.docx)</button>
        <div id="status">Ready 🚀</div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const btn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        
        btn.onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Pehle file select karein!");

            btn.disabled = true;
            status.innerHTML = '<span style="color: #f72585;">Processing... Scan ho raha hai ⏳</span>';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const docContent = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    status.innerText = `Page ${i} of ${pdf.numPages} scan ho raha hai...`;
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(s => s.str).join(' ');
                    
                    docContent.push(new docx.Paragraph({
                        children: [new docx.TextRun({ text: pageText, break: 1 })]
                    }));
                }

                status.innerText = "Word file ban rahi hai...";
                const doc = new docx.Document({ sections: [{ children: docContent }] });
                const blob = await docx.Packer.toBlob(doc);
                saveAs(blob, file.name.replace(".pdf", "") + "_MayurTeam.docx");
                status.innerHTML = "<span style='color: #4ade80;'>✅ Done! Download ho gaya.</span>";
            } catch (err) {
                status.innerHTML = "<span style='color: #f72585;'>❌ Error: File complex hai. Doosri try karein.</span>";
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
