<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayur PDF Ultra - Free & Premium Tools</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@7.1.0/build/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #00f2ff; --premium: #ffae00; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Ad Space Styling */
        .ad-space { background: rgba(255,255,255,0.05); width: 100%; max-width: 728px; height: 90px; margin: 20px 0; display: flex; align-items: center; justify-content: center; border: 1px dashed #444; font-size: 12px; color: #666; }

        .container { background: var(--card); padding: 30px; border-radius: 30px; width: 90%; max-width: 500px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        
        .premium-tag { position: absolute; top: 15px; right: -30px; background: var(--premium); color: black; padding: 5px 40px; transform: rotate(45deg); font-size: 12px; font-weight: bold; }

        h1 { background: linear-gradient(to right, #00f2ff, #006aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        
        .upload-area { background: rgba(0,242,255,0.05); border: 2px dashed var(--primary); padding: 40px 20px; border-radius: 20px; margin: 25px 0; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { background: rgba(0,242,255,0.1); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: #334155; border: none; padding: 18px; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; position: relative; }
        .btn:hover { background: var(--primary); color: #000; }
        .btn.gold { border: 1px solid var(--premium); }
        .btn.gold::after { content: "⭐"; position: absolute; top: 5px; right: 5px; font-size: 10px; }

        .pricing { margin-top: 30px; padding: 15px; border-radius: 15px; background: rgba(255,174,0,0.1); border: 1px solid var(--premium); width: 100%; max-width: 450px; }
        
        #status { margin-top: 20px; font-size: 14px; padding: 10px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div class="ad-space">Google AdSense Banner (Top)</div>

    <div class="container">
        <div class="premium-tag">ULTRA</div>
        <h1>Mayur PDF Tools</h1>
        <p style="opacity: 0.6;">Duniya ka sabse fast converter!</p>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <strong id="nameTxt">PDF File Select Karein</strong>
            <input type="file" id="fileInput" accept="application/pdf" style="display:none">
        </div>

        <div class="grid">
            <button class="btn" onclick="process('word')">PDF to Word</button>
            <button class="btn" onclick="process('jpg')">PDF to JPG</button>
            <button class="btn gold" onclick="alert('Premium Features: High Quality, No Ads, Bulk Upload. Coming Soon!')">Compress (Pro)</button>
            <button class="btn gold" onclick="alert('Premium Feature: Extract Images in HD. Coming Soon!')">Split (Pro)</button>
        </div>

        <div id="status"></div>
    </div>

    <div class="pricing">
        <h3 style="margin:0; color:var(--premium);">Go Premium ⭐</h3>
        <p style="font-size:12px; margin:5px 0;">Ads hatao aur bade PDF convert karo sirf ₹49 mein!</p>
        <button style="background:var(--premium); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="window.location.href='mailto:your-email@gmail.com?subject=Premium Inquiry'">Buy Premium</button>
    </div>

    <div class="ad-space">Google AdSense Banner (Bottom)</div>

    <p style="font-size:12px; opacity:0.4; margin:20px 0;">© 2026 Mayur Team - Privacy First</p>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');

        fileInput.onchange = (e) => {
            if(e.target.files[0]) document.getElementById('nameTxt').innerText = e.target.files[0].name;
        };

        function showStatus(msg, color = '#00f2ff') {
            status.style.display = 'block';
            status.style.background = color + '22';
            status.style.color = color;
            status.innerText = msg;
        }

        async function process(type) {
            const file = fileInput.files[0];
            if(!file) return alert("Bhai, file kahan hai?");

            showStatus("Processing... Mayur Team ka jadu chal raha hai ⏳");
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;

            try {
                if(type === 'word') {
                    let sections = [];
                    for(let i=1; i<=pdf.numPages; i++){
                        const page = await pdf.getPage(i);
                        const text = await page.getTextContent();
                        sections.push(new docx.Paragraph({ children: [new docx.TextRun(text.items.map(s => s.str).join(' '))] }));
                    }
                    const doc = new docx.Document({ sections: [{ children: sections }] });
                    const blob = await docx.Packer.toBlob(doc);
                    saveAs(blob, "MayurTeam_" + file.name.replace(".pdf", ".docx"));
                } 
                else if(type === 'jpg') {
                    const zip = new JSZip();
                    for(let i=1; i<=pdf.numPages; i++){
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({scale: 1.5});
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({canvasContext: context, viewport: viewport}).promise;
                        zip.file(`page_${i}.jpg`, canvas.toDataURL('image/jpeg', 0.8).split(',')[1], {base64: true});
                    }
                    saveAs(await zip.generateAsync({type:"blob"}), "MayurTeam_Images.zip");
                }
                showStatus("✅ Success! Aapki file ready hai.", "#4ade80");
            } catch(e) {
                showStatus("❌ Kuch error aaya. Koshish karte rahein!", "#ff4d4d");
            }
        }
    </script>
</body>
    </html>
