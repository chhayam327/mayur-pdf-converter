<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-[#0b0e14] text-white font-sans">

    <div class="p-4 flex justify-between items-center border-b border-gray-800">
        <span class="text-purple-500 font-bold text-lg italic">Mayur Team</span>
        <button onclick="openPremium()" class="bg-gradient-to-r from-purple-600 to-pink-600 px-4 py-1 rounded-full text-xs font-bold">PREMIUM</button>
    </div>

    <div class="p-4 grid grid-cols-2 gap-4">
        <div onclick="document.getElementById('pdfFile').click()" class="bg-[#1a1f29] p-6 rounded-2xl text-center border border-purple-900/50">
            <div class="text-blue-500 text-3xl mb-2">📄➡️W</div>
            <p class="text-sm font-bold">PDF to WORD</p>
            <input type="file" id="pdfFile" class="hidden" onchange="uploadFile()">
        </div>
        <div class="bg-[#1a1f29] p-6 rounded-2xl text-center border border-gray-800">
            <div class="text-green-500 text-3xl mb-2">📊</div>
            <p class="text-sm font-bold">Simple Excel</p>
        </div>
    </div>

    <div class="fixed bottom-0 w-full bg-[#0b0e14] flex justify-around p-4 border-t border-gray-800">
        <button class="text-gray-500">Recent</button>
        <button class="text-blue-500 font-bold">Discover</button>
        <button class="text-gray-500">Premium</button>
    </div>

    <div id="payModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6">
        <div class="bg-white text-black p-6 rounded-3xl w-full text-center">
            <h2 class="font-bold text-xl mb-2">Upgrade to Premium</h2>
            <p class="text-sm text-gray-600 mb-4">Daily 6 limit se chhutkara paayein</p>
            
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=7066300414@ybl&pn=Mayur&am=99&cu=INR" class="mx-auto w-48 mb-4 border-4 border-gray-100 p-2">
            
            <p class="font-bold text-sm">UPI ID: 7066300414@ybl</p>
            
            <div id="timerBox" class="hidden mt-4 p-3 bg-yellow-100 rounded-lg">
                <p class="text-xs">Verifying Payment... <span id="timer" class="font-bold">60</span>s</p>
            </div>

            <button onclick="startTimer()" class="mt-6 bg-black text-white w-full py-3 rounded-xl font-bold">I Have Paid</button>
            <button onclick="closePremium()" class="mt-2 text-gray-400 text-xs">Close</button>
        </div>
    </div>

    <script>
        function openPremium() { document.getElementById('payModal').classList.remove('hidden'); }
        function closePremium() { document.getElementById('payModal').classList.add('hidden'); }

        function startTimer() {
            document.getElementById('timerBox').classList.remove('hidden');
            let sec = 60;
            let countdown = setInterval(() => {
                sec--;
                document.getElementById('timer').innerText = sec;
                if (sec <= 0) {
                    clearInterval(countdown);
                    alert("System busy. Please send screenshot to 7066300414 for manual activation.");
                }
            }, 1000);
        }

        function uploadFile() {
            alert("PDF to Word conversion started... Please wait.");
            // Backend URL yahan connect hogi
        }
    </script>
                </body>
